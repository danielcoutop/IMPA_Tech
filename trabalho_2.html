<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SVG Componentes</title>
</head>
<body>

<svg width="0" height="0" style="position:absolute;">
  <!-- Definição do "componente" -->
  <symbol id="icone-circulo" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" fill="blue" />
  </symbol>
</svg>

<!-- Usando o componente várias vezes -->

<svg width="300" height="120">

  <use href="#icone-circulo" x="0" y="10" width="80" height="80" />

  <use href="#icone-circulo" x="100" y="10" width="80" height="80" fill="red" />

  <use href="#icone-circulo" x="200" y="10" width="80" height="80" fill="green" />

</svg>

</body>
</html>
